server:
  port: 8080

spring:
  application:
    name: rag-service
  datasource:
    url: ${RAG_DATASOURCE_URL:jdbc:postgresql://localhost:5432/my_rag}
    username: ${RAG_DATASOURCE_USERNAME:rag}
    password: ${RAG_DATASOURCE_PASSWORD:rag}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  mapper-locations: classpath*:/mapper/**/*.xml

springdoc:
  swagger-ui:
    path: /swagger-ui.html

rag:
  chunk:
    min-chars: 300
    max-chars: 4000
    overlap-chars: 150
  index:
    worker-threads: 1
    queue-capacity: 20
    tika-max-extract-chars: 5000000
  retrieval:
    mode: ${RAG_RETRIEVAL_MODE:vector}
    default-top-k: 20
    vector-top-k: ${RAG_RETRIEVAL_VECTOR_TOP_K:20}
    keyword-top-k: ${RAG_RETRIEVAL_KEYWORD_TOP_K:20}
    rrf-top-k: ${RAG_RETRIEVAL_RRF_TOP_K:30}
    rerank-top-k: ${RAG_RETRIEVAL_RERANK_TOP_K:8}
    context-top-k: 8
    score-threshold: 0.35
    rrf-k: ${RAG_RETRIEVAL_RRF_K:60}
    text-search-config: ${RAG_TEXT_SEARCH_CONFIG:jiebacfg}
    keyword-index-enabled: ${RAG_KEYWORD_INDEX_ENABLED:false}
    keyword-query-mode: ${RAG_KEYWORD_QUERY_MODE:websearch}
    keyword-max-queries: ${RAG_KEYWORD_MAX_QUERIES:3}
    reranker-provider: ${RAG_RERANKER_PROVIDER:noop}
    max-context-chars: ${RAG_MAX_CONTEXT_CHARS:8000}
  model:
    embedding-provider: ${RAG_EMBEDDING_PROVIDER:mock}
    embedding-model: ${RAG_EMBEDDING_MODEL:text-embedding-v4}
    embedding-dimension: ${RAG_EMBEDDING_DIMENSION:1024}
    embedding-batch-size: ${RAG_EMBEDDING_BATCH_SIZE:10}
    embedding-base-url: ${RAG_EMBEDDING_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    embedding-api-key: ${RAG_EMBEDDING_API_KEY:}
    embedding-request-timeout-seconds: ${RAG_EMBEDDING_TIMEOUT_SECONDS:60}
    embedding-price-per-1k-tokens: ${RAG_EMBEDDING_PRICE_PER_1K_TOKENS:0.0005}
    chat-provider: ${RAG_CHAT_PROVIDER:mock}
    chat-model: ${RAG_CHAT_MODEL:deepseek-v4-flash}
    chat-base-url: ${RAG_CHAT_BASE_URL:https://api.deepseek.com}
    chat-api-key: ${RAG_CHAT_API_KEY:}
    chat-request-timeout-seconds: ${RAG_CHAT_TIMEOUT_SECONDS:60}
    chat-temperature: ${RAG_CHAT_TEMPERATURE:0.2}
  storage:
    upload-dir: ${RAG_UPLOAD_DIR:uploads/documents}
