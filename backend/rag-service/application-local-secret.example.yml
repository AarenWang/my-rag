spring:
  datasource:
    url: jdbc:postgresql://<host>:5432/<database>?sslmode=disable
    username: <database-username>
    password: <database-password>

rag:
  retrieval:
    # Keep vector until pg_jieba/zhparser and search indexes are ready.
    mode: vector
    keyword-index-enabled: false
    text-search-config: jiebacfg
    keyword-query-mode: websearch
    keyword-max-queries: 3
    reranker-provider: noop
  model:
    # Example: DashScope embeddings + OpenAI-compatible chat.
    embedding-provider: dashscope
    embedding-base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
    embedding-api-key: <dashscope-api-key>
    embedding-model: text-embedding-v4
    embedding-dimension: 1024
    embedding-batch-size: 10
    embedding-price-per-1k-tokens: 0.0005
    chat-provider: openai-compatible
    chat-base-url: https://api.deepseek.com
    chat-api-key: <deepseek-api-key>
    chat-model: deepseek-v4-flash
    chat-temperature: 0.2
