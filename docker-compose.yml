services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: my-rag-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: my_rag
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag -d my_rag"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

